<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8" />
    <title>Fanorona Telo Arena</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* L'arène fixe */
        .arena-container {
            position: relative;
            width: 340px;
            height: 340px;
            background-color: #f5e1c8;
            border: 6px solid #4a2e1b;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            box-sizing: border-box;
            padding: 15px;
        }

        /* Lignes de fond du plateau */
        .line-overlay {
            position: absolute;
            top: 15px; left: 15px; right: 15px; bottom: 15px;
            pointer-events: none;
            z-index: 1;
        }
        .line {
            position: absolute;
            background-color: #4a2e1b;
        }
        .line.h-mid { top: 50%; left: 0; right: 0; height: 4px; transform: translateY(-50%); }
        .line.v-mid { left: 50%; top: 0; bottom: 0; width: 4px; transform: translateX(-50%); }
        
        .inner-square {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: 4px solid #4a2e1b;
            box-sizing: border-box;
        }
        
        /* Croix diagonales */
        .diag1 { position: absolute; top: 0; left: 0; width: 141.4%; height: 4px; background: #4a2e1b; transform: rotate(45deg); transform-origin: top left; }
        .diag2 { position: absolute; top: 0; right: 0; width: 141.4%; height: 4px; background: #4a2e1b; transform: rotate(-45deg); transform-origin: top right; }

        /* Noeuds d'intersections cliquables */
        .intersection-node {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }

        /* Design Premium Effet Céramique des Pions */
        .pion {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            transition: transform 0.1s ease;
            box-shadow: 0 5px 8px rgba(0,0,0,0.3), inset 0 -4px 6px rgba(0,0,0,0.25);
        }
        .pion:hover { transform: scale(1.12); }
        .pion.joueur1 { background: radial-gradient(circle at 30% 30%, #404040, #111); border: 2px solid #000; }
        .pion.joueur2 { background: radial-gradient(circle at 30% 30%, #ffffff, #ccc); border: 2px solid #aaa; }
        .pion.selected { border: 3px solid #ffcc00; box-shadow: 0 0 15px #ffcc00, 0 5px 8px rgba(0,0,0,0.3); }
        
        /* Intersections vides */
        .vide {
            width: 16px;
            height: 16px;
            background-color: #4a2e1b;
            border-radius: 50%;
            border: 2px solid #f5e1c8;
            transition: all 0.1s;
        }
        .intersection-node:hover .vide { background-color: #ff9900; transform: scale(1.3); }
    </style>
</head>
<body>

    <div class="arena-container" id="arena">
        <div class="line-overlay">
            <div class="inner-square"></div>
            <div class="line h-mid"></div>
            <div class="line v-mid"></div>
            <div class="line diag1"></div>
            <div class="line diag2"></div>
        </div>
    </div>

    <script src="./streamlit-component-lib.js"></script>
    <script>
        // Drapeau indispensable pour bloquer la boucle infinie de rendu
        let heightSet = false;

        function sendToStreamlit(row, col) {
            Streamlit.setComponentValue({row: row, col: col});
        }

        function onRender(data) {
            if (!data) return;
            
            const plateau = data.plateau;
            const selected = data.pion_selectionne;
            
            if (!plateau || !plateau[0]) return;

            const arena = document.getElementById("arena");
            if (!arena) return;

            // Nettoyage propre des anciens nœuds
            const oldNodes = arena.querySelectorAll(".intersection-node");
            oldNodes.forEach(n => n.remove());

            // Régénération dynamique de la matrice 3x3
            for (let i = 0; i < 3; i++) {
                for (let j = 0; j < 3; j++) {
                    const cellValue = plateau[i][j];
                    const node = document.createElement("div");
                    node.className = "intersection-node";
                    node.onclick = () => sendToStreamlit(i, j);

                    if (cellValue === 1) {
                        const pion = document.createElement("div");
                        pion.className = "pion joueur1";
                        if (selected && selected[0] === i && selected[1] === j) {
                            pion.classList.add("selected");
                        }
                        node.appendChild(pion);
                    } else if (cellValue === 2) {
                        const pion = document.createElement("div");
                        pion.className = "pion joueur2";
                        if (selected && selected[0] === i && selected[1] === j) {
                            pion.classList.add("selected");
                        }
                        node.appendChild(pion);
                    } else {
                        const vide = document.createElement("div");
                        vide.className = "vide";
                        node.appendChild(vide);
                    }
                    arena.appendChild(node);
                }
            }

            // FIX BOUCLE INFINIE : On ne définit la hauteur qu'une seule fois au départ
            if (!heightSet) {
                Streamlit.setFrameHeight(360);
                heightSet = true;
            }
        }

        // Écouteur de message compatible avec votre version de streamlit-component-lib.js
        window.addEventListener("message", (e) => {
            if (e.data.type === "streamlit:render") {
                onRender(e.data.args);
            }
        });
    </script>
</body>
</html>
